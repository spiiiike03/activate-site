<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>卡号激活</title>
  <style>
    :root {
      --bg: #f5f3f0;
      --panel: #ffffff;
      --panel-soft: #fcfaf7;
      --line: #e7dfd4;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2e7d32;
      --primary-dark: #246429;
      --soft: #f1ede6;
      --accent: #ff9800;
      --accent-dark: #ef6c00;
      --danger: #c62828;
      --success: #1b8f45;
      --shadow: 0 18px 40px rgba(58, 44, 28, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 28%),
        linear-gradient(180deg, #f8f6f2 0%, var(--bg) 100%);
      padding: 24px;
    }

    #activate-app {
      min-height: calc(100vh - 48px);
    }

    #activate-app > main {
      max-width: 1040px;
      margin: 0 auto;
    }

    .activate-hero,
    .section-card,
    .activate-modal {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(231, 223, 212, 0.8);
    }

    .activate-hero {
      padding: 28px 30px;
      margin-bottom: 18px;
      background:
        linear-gradient(135deg, rgba(46, 125, 50, 0.08), rgba(255, 152, 0, 0.06)),
        var(--panel);
    }

    .hero-title h1,
    .section-head h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      color: #18212d;
    }

    .hero-title p,
    .section-head p,
    .field-hint,
    .support-card-note,
    .support-agent-copy,
    .confirm-note,
    .empty-state {
      color: var(--muted);
    }

    .hero-title p:last-child,
    .section-head p {
      margin: 10px 0 0;
      line-height: 1.7;
    }

    .eyebrow,
    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef5ef;
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .activate-tabs {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      margin-bottom: 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(231, 223, 212, 0.9);
      box-shadow: 0 10px 24px rgba(58, 44, 28, 0.05);
      backdrop-filter: blur(8px);
    }

    .activate-tab,
    .btn,
    .support-contact-card {
      border: none;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .activate-tab {
      padding: 12px 18px;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .activate-tab.active {
      background: var(--panel);
      color: var(--primary-dark);
      box-shadow: 0 8px 18px rgba(46, 125, 50, 0.12);
    }

    .activate-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .section-card {
      padding: 24px;
    }

    .activate-panel-inactive {
      opacity: 0.72;
    }

    .section-head,
    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .section-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .activate-form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 18px;
    }

    .textarea-field {
      display: block;
    }

    .textarea-field > span {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: #233244;
    }

    textarea {
      width: 100%;
      min-height: 132px;
      padding: 14px 15px;
      border-radius: 12px;
      border: 1px solid #d8d0c5;
      background: var(--panel-soft);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    textarea:focus {
      border-color: rgba(46, 125, 50, 0.65);
      box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.12);
      background: #fff;
    }

    .field-hint {
      display: block;
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.6;
    }

    .btn {
      padding: 11px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
    }

    .btn:disabled,
    .activate-tab:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
      box-shadow: none;
    }

    .btn-primary {
      background: linear-gradient(180deg, #358d39 0%, var(--primary) 100%);
      color: #fff;
      box-shadow: 0 12px 24px rgba(46, 125, 50, 0.18);
    }

    .btn-soft {
      background: var(--soft);
      color: #384252;
    }

    .btn:not(:disabled):hover,
    .activate-tab:not(:disabled):hover,
    .support-contact-card:hover {
      transform: translateY(-1px);
    }

    .error-banner,
    .success-banner,
    .info-banner {
      padding: 14px 16px;
      margin-bottom: 16px;
      border-radius: 12px;
      border: 1px solid transparent;
      line-height: 1.6;
    }

    .error-banner {
      background: #fff0f0;
      border-color: #f2c5c5;
      color: var(--danger);
    }

    .success-banner {
      background: #eefaf0;
      border-color: #c8e8d0;
      color: var(--success);
    }

    .info-banner {
      background: #fff8ea;
      border-color: #f6dfb1;
      color: #8a5b00;
    }

    .table-wrap {
      margin-top: 18px;
      overflow: auto;
      border: 1px solid #ece3d7;
      border-radius: 14px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid #f0e8dd;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #faf6f0;
      color: #435161;
      font-weight: 700;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.ok {
      background: #e9f8ee;
      color: #1e7c3f;
    }

    .badge.warn {
      background: #fff4dc;
      color: #9a6200;
    }

    .badge.bad {
      background: #ffe9e9;
      color: #b83535;
    }

    .badge.neutral {
      background: #eef2f6;
      color: #526170;
    }

    .mono {
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }

    .cell-wrap {
      word-break: break-word;
    }

    .activate-support {
      position: relative;
      overflow: hidden;
    }

    .activate-support::before {
      content: "";
      position: absolute;
      inset: auto -60px -80px auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255, 152, 0, 0.18), transparent 68%);
      pointer-events: none;
    }

    .activate-support-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .support-contact-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 22px 20px;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(250, 246, 239, 0.98));
      border: 1px solid rgba(236, 227, 215, 0.95);
      box-shadow: 0 14px 30px rgba(58, 44, 28, 0.08);
      text-align: center;
    }

    .support-contact-card strong,
    .support-agent-title {
      margin: 8px 0 10px;
      font-size: 28px;
      line-height: 1.15;
      color: #1b2430;
    }

    .support-contact-label {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff4e5;
      color: #9a6200;
      font-size: 12px;
      font-weight: 700;
    }

    .support-agent-actions {
      margin: 8px 0 12px;
    }

    .support-agent-btn {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffad32 0%, var(--accent) 100%);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(255, 152, 0, 0.22);
    }

    .support-service-btn {
      background: linear-gradient(180deg, #46a74a 0%, var(--primary) 100%);
      box-shadow: 0 10px 20px rgba(46, 125, 50, 0.2);
    }

    .support-card-note,
    .support-agent-copy {
      margin: 0;
      font-size: 13px;
      line-height: 1.7;
    }

    .activate-modal-backdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(17, 24, 39, 0.42);
      backdrop-filter: blur(6px);
      z-index: 999;
    }

    .activate-modal {
      width: min(760px, 100%);
      padding: 24px;
    }

    .confirm-preview-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .confirm-preview-item {
      padding: 14px;
      border-radius: 12px;
      background: #faf7f2;
      border: 1px solid #ece3d7;
    }

    .confirm-preview-item small {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
    }

    .confirm-preview-item strong {
      word-break: break-word;
    }

    @media (max-width: 860px) {
      body {
        padding: 14px;
      }

      .activate-layout,
      .activate-support-grid {
        grid-template-columns: 1fr;
      }

      .section-head,
      .hero-top {
        flex-direction: column;
      }

      .section-actions {
        width: 100%;
      }

      .section-actions .btn {
        width: 100%;
      }

      .activate-tabs {
        display: flex;
        width: 100%;
      }

      .activate-tab {
        flex: 1 1 0;
      }
    }
  </style>
</head>
<body>
  <div id="activate-app"></div>
  <script>
    window.TEAM_CONSOLE_BOOT = {
      apiBase: "https://activate.xile.indevs.in",
      assetVersion: "1"
    };
  </script>
  <script src="./app.js"></script>
</body>
</html>
